<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="icon" type="image/png" href="assets\images\favicon\euoryan.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --color-bg: #0d1117;
            --color-text: #c9d1d9;
            --color-border: #30363d;
            --color-header: #161b22;
            --color-btn-bg: #21262d;
            --color-btn-hover: #2d333b;
            --color-btn-border: #30363d;
            --color-text-hover: #ffffff;
            --color-footer-text: #8b949e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background-color: var(--color-header);
            padding: 20px;
            border-bottom: 1px solid var(--color-border);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 16px;
            width: 100%;
        }

        .contact-card {
            background-color: var(--color-btn-bg);
            border: 1px solid var(--color-border);
            border-radius: 6px;
            padding: 16px;
            margin: 24px 0;
        }

        .section-title {
            font-size: 16px;
            color: var(--color-text);
            margin-bottom: 8px;
            padding-left: 12px;
            font-weight: 500;
        }

        h1 {
            font-size: 20px;
            color: #ffffff;
            font-weight: 500;
            line-height: 1.5;
        }

        .contact-list {
            list-style: none;
        }

        .contact-item {
            border-bottom: 1px solid var(--color-border);
        }

        .contact-item:last-child {
            border-bottom: none;
        }

        .contact-link {
            color: var(--color-text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            transition: all 0.2s ease;
            border-radius: 6px;
        }

        .contact-link:hover {
            background-color: var(--color-btn-hover);
            color: var(--color-text-hover);
        }

        .icon {
            font-size: 16px;
            width: 16px;
            text-align: center;
            color: var(--color-text);
        }

        .contact-link:hover .icon {
            color: var(--color-text-hover);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 5px 16px;
            font-size: 14px;
            font-weight: 500;
            line-height: 20px;
            white-space: nowrap;
            vertical-align: middle;
            cursor: pointer;
            user-select: none;
            border: 1px solid var(--color-btn-border);
            border-radius: 6px;
            appearance: none;
            background-color: var(--color-btn-bg);
            color: var(--color-text);
            transition: .2s;
            text-decoration: none;
        }

        .btn:hover {
            background-color: var(--color-btn-hover);
            border-color: var(--color-btn-border);
            color: var(--color-text-hover);
        }

        .btn i {
            font-size: 14px;
        }

        main {
            flex: 1;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <h1>Contato</h1>
        </div>
    </header>

    <main class="container">
        <div class="contact-card">
            <h2 class="section-title">Redes Sociais</h2>
            <ul class="contact-list">
                <li class="contact-item">
                    <a href="https://github.com/euoryan" class="contact-link">
                        <i class="fab fa-github icon"></i>
                        GitHub
                    </a>
                </li>
                <li class="contact-item">
                    <a href="https://linkedin.com/in/euoryan" class="contact-link">
                        <i class="fab fa-linkedin icon"></i>
                        LinkedIn
                    </a>
                </li>
                <li class="contact-item">
                    <a href="https://www.instagram.com/euoryan/" class="contact-link">
                        <i class="fab fa-instagram icon"></i>
                        Instagram
                    </a>
                </li>
                <li class="contact-item">
                    <a href="https://twitter.com/euoryan_" class="contact-link">
                        <i class="fab fa-twitter icon"></i>
                        Twitter
                    </a>
                </li>
            </ul>
        </div>

        <div class="contact-card">
            <h2 class="section-title">Meios de Contato</h2>
            <ul class="contact-list">
                <li class="contact-item">
                    <a href="mailto:ryanzera.dev@gmail.com" class="contact-link">
                        <i class="far fa-envelope icon"></i>
                        contato@euoryan.com
                    </a>
                </li>
                <li class="contact-item">
                    <a href="tel:+5548984613946" class="contact-link">
                        <i class="fas fa-phone icon"></i>
                        +55 (48) 98461-3946
                    </a>
                </li>
            </ul>
        </div>

        <a href="#" class="btn" onclick="window.history.back()">
            <i class="fas fa-arrow-left"></i>
            Voltar
        </a>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // URL do footer no GitHub Raw
            const footerUrl = 'https://github.com/euoryan/euoryan.github.io/raw/refs/heads/main/assets/pages/footer.html';
        
            // Função para carregar o footer
            function loadFooter() {
                fetch(footerUrl)
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('Erro ao carregar o footer');
                        }
                        return response.text();
                    })
                    .then(html => {
                        // Criar um container para o footer
                        const footerContainer = document.createElement('div');
                        footerContainer.innerHTML = html.trim();
        
                        // Pegar o footer do HTML carregado
                        const newFooter = footerContainer.querySelector('footer');
        
                        if (newFooter) {
                            // Substituir o footer existente
                            const existingFooter = document.querySelector('footer');
                            if (existingFooter) {
                                existingFooter.parentNode.replaceChild(newFooter, existingFooter);
                            } else {
                                // Se não existir footer, adicionar ao final do body
                                document.body.appendChild(newFooter);
                            }
                        } else {
                            throw new Error('Nenhum footer encontrado');
                        }
                    })
                    .catch(error => {
                        console.error('Erro ao carregar o footer:', error);
                        
                        // Criar footer de fallback
                        const fallbackFooter = document.createElement('footer');
                        fallbackFooter.className = 'footer';
                        fallbackFooter.innerHTML = `
                            <div class="footer-container">
                                <div class="footer-rights">
                                    <span>© 2024 por Ryan</span>
                                </div>
                            </div>
                        `;
                        
                        // Substituir ou adicionar footer de fallback
                        const existingFooter = document.querySelector('footer');
                        if (existingFooter) {
                            existingFooter.parentNode.replaceChild(fallbackFooter, existingFooter);
                        } else {
                            document.body.appendChild(fallbackFooter);
                        }
                    });
            }
        
            // Chamar a função para carregar o footer
            loadFooter();
        });
    </script>
</body>
</html>
